# ---------- Server ----------
server.port=8080

# ---------- MySQL Datasource ----------
spring.datasource.url=jdbc:mysql://localhost:3306/employee_management_system?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=Test@123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---------- JPA / Hibernate ----------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ---------- JWT ----------
# 256-bit secret used to sign tokens - change this in production and keep it out of source control
app.jwt.secret=ChangeThisToALongRandomSecretKeyThatIsAtLeast256BitsForHS256Alg
app.jwt.expiration-ms=86400000

# ---------- CORS ----------
app.cors.allowed-origins=http://localhost:3000
